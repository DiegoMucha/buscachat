name: Deploy Buscachat Python

on:
  push:
    branches:
      - main
    paths:
      - "buscachat-python/**"

concurrency:
  group: deploy-buscachat-python
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install cloudflared
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo tee /usr/share/keyrings/cloudflare-main.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update
          sudo apt-get install -y cloudflared

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_DEPLOY_KEY }}" > ~/.ssh/server_deploy_key
          test -s ~/.ssh/server_deploy_key
          chmod 600 ~/.ssh/server_deploy_key

      - name: Deploy on server
        run: |
          ssh \
            -i ~/.ssh/server_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ProxyCommand="cloudflared access ssh --hostname %h" \
            lozabot@ssh.sumak.space \
            'bash -se' <<'REMOTE_DEPLOY'
          set -euo pipefail

          APP_DIR=/home/lozabot/buscachat-venezuela
          BRANCH=main
          SERVICE_NAME=buscachat-python

          retry() {
            local attempts="$1"
            local delay="$2"
            shift 2

            local attempt=1
            while true; do
              if "$@"; then
                return 0
              fi

              if (( attempt >= attempts )); then
                echo "Command failed after $attempt attempts: $*" >&2
                return 1
              fi

              echo "Command failed, retrying in ${delay}s ($attempt/$attempts): $*" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          cd "$APP_DIR"
          retry 5 5 git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git merge --ff-only FETCH_HEAD

          APP_DIR="$APP_DIR" SERVICE_NAME="$SERVICE_NAME" ./buscachat-python/scripts/prod-deploy-server.sh
          REMOTE_DEPLOY
