name: CI

on:
  pull_request:
    branches: [main]
    paths: ["buscachat-python/**"]
  push:
    branches: [main]
    paths: ["buscachat-python/**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: buscachat-python

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Tests (unit, skip e2e)
        run: uv run pytest
