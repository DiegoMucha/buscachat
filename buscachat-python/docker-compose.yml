services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: buscachat-python-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buscachat_dev
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buscachat_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
